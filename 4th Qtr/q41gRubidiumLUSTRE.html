<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Rating</title>

  <style>
    body {
        font-family: "Poppins", "Segoe UI", Arial, sans-serif;
        background: linear-gradient(135deg, #c9d6df, #e2ebf0);
        padding: 30px;
        margin: 0;
    }

    form {
        max-width: 720px;
        margin: auto;
        background: #f5f7fa;
        padding: 24px;
        border-radius: 16px;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
        border-top: 8px solid #fca5a5;
    }

    h2 {
        text-align: center;
        margin-bottom: 16px;
        color: #1f2937;
        font-weight: 800;
    }

    label {
        display: block;
        margin: 12px 0;
        color: #1f2937;
        font-weight: 600;
    }

    input, select {
        width: 100%;
        box-sizing: border-box;
        padding: 10px;
        border: 2px solid #38bdf8;
        border-radius: 10px;
        font-size: 0.95em;
        background: white;
    }

    input:focus,
    select:focus {
        outline: none;
        border-color: #22c55e;
        box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.25);
    }

    #stars {
        margin-top: 8px;
        font-size: 28px;
        cursor: pointer;
    }

    .star {
        color: #cbd5e1;
    }

    .star.active {
        color: gold;
    }

    button {
        width: 100%;
        padding: 10px 18px;
        border: none;
        border-radius: 999px;
        font-weight: 700;
        cursor: pointer;
        background: #38bdf8;
        color: #0f172a;
        margin-top: 10px;
    }

    button:hover {
        background: #0ea5e9;
        color: white;
    }

    #movieList {
        max-width: 720px;
        margin: 20px auto;
        background: #f5f7fa;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 10px 26px rgba(0, 0, 0, 0.12);
    }
  </style>

</head>

<body>

<form id="movieForm">

    <h2>Add a Movie</h2>

    <!-- Collects information on the mpovie (title, year, genre, and rating)-->
    <label> Title:
        <input type="text" id="movieTitle" name="movieTitle" required>
    </label>

    <label> Year:
        <input type="number" id="movieYear" name="movieYear" required>
    </label>

    <label> Genre:
        <select name="movieGenre" id="movieGenre" required>
            <option value="">Pick a Genre</option>
            <option value="Comedy">Comedy</option>
            <option value="Action">Action</option>
            <option value="Romance">Romance</option>
            <option value="Drama">Drama</option>
            <option value="Horror">Horror</option>
            <option value="Sci-fi">Sci-Fi</option>
            <option value="Fantasy">Fantasy</option>
        </select>
    </label>

    <label> Rating:
        <div id="stars">
            <span class="star" data-value="1">★</span>
            <span class="star" data-value="2">★</span>
            <span class="star" data-value="3">★</span>
            <span class="star" data-value="4">★</span>
            <span class="star" data-value="5">★</span>
        </div>
    </label>

    <button type="button" onclick="addMovie()">Add Movie</button>

</form>

<!-- this area would display the movie list -->

    <div id="movieList">
        <h2>Movie List</h2>
    </div>

<script src="q41gRubidiumLUSTRE.js"></script>

</body>

</html>
